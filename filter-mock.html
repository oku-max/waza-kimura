<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フィルターモック</title>
<style>
  :root {
    --surface: #1a1a2e;
    --surface2: #16213e;
    --border: #2a2a4a;
    --text1: #e0e0f0;
    --text2: #a0a0c0;
    --text3: #6060a0;
    --accent: #7c6af7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111122;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }

  /* ── フィルターパネル本体 ── */
  #filter-panel {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }

  /* ヘッダー */
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .panel-title {
    font-weight: 700;
    font-size: 13px;
    color: var(--text1);
  }
  .close-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text2);
    padding: 0 4px;
  }

  /* ── 行レイアウト ── */
  .fbar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fbar-lbl {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .7px;
    color: var(--text3);
    text-transform: uppercase;
    min-width: 60px;
    flex-shrink: 0;
  }

  /* ── チップ ── */
  .chip {
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text1); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .c-fav { border-color: #f59e0b44; color: #f59e0b; }
  .c-unw { border-color: #6366f144; color: #818cf8; }

  /* ── hrow（タグ行） ── */
  .hrow {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .htag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
  }

  /* ── セクショングループ ── */
  .fsec {
    border-radius: 8px;
    padding: 9px 10px 5px;
    margin-bottom: 8px;
    border-left: 3px solid transparent;
  }
  .fsec-title {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: .8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* グループ1：ステータス・頻度・着手系 → 紫/インディゴ */
  .fsec-1 {
    background: rgba(99,102,241,.08);
    border-left-color: #6366f1;
  }
  .fsec-1 .fsec-title { color: #818cf8; }

  /* グループ2：チャンネル・プレイリスト → 緑 */
  .fsec-2 {
    background: rgba(16,185,129,.07);
    border-left-color: #10b981;
  }
  .fsec-2 .fsec-title { color: #34d399; }

  /* グループ3：コンテンツ（技術・ポジション）→ アンバー */
  .fsec-3 {
    background: rgba(245,158,11,.07);
    border-left-color: #f59e0b;
  }
  .fsec-3 .fsec-title { color: #fbbf24; }

  /* ── 区切り・保存エリア ── */
  .save-area {
    border-top: 1px solid var(--border);
    margin-top: 4px;
    padding-top: 10px;
  }
  .save-area-title {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .6px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .save-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .save-input {
    flex: 1;
    font-size: 11px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text1);
    min-width: 0;
  }
  .save-btn {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
  }
  .reset-btn {
    width: 100%;
    padding: 7px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    margin-top: 4px;
  }
  .reset-btn:hover { border-color: #ef4444; color: #ef4444; }
</style>
</head>
<body>

<div id="filter-panel">

  <!-- ヘッダー -->
  <div class="panel-header">
    <span class="panel-title">⊟ フィルター</span>
    <button class="close-btn">✕</button>
  </div>

  <!-- ▌グループ1：ステータス・頻度・着手系 -->
  <div class="fsec fsec-1">
    <div class="fsec-title">📊 ステータス・頻度・着手</div>

    <div class="fbar-row">
      <span class="fbar-lbl">Status</span>
      <div class="hrow">
        <div class="chip c-fav">★ Fav</div>
        <div class="chip c-unw">Unseen</div>
        <div class="chip">視聴済み</div>
        <div class="chip">🔖 ブックマークあり</div>
        <div class="chip">💬 メモあり</div>
      </div>
    </div>

    <div class="fbar-row">
      <span class="fbar-lbl">Progress</span>
      <div class="hrow">
        <div class="chip">未着手</div>
        <div class="chip on">練習中</div>
        <div class="chip">マスター</div>
      </div>
    </div>

    <div class="fbar-row" style="margin-bottom:3px">
      <span class="fbar-lbl">Priority</span>
      <div class="hrow">
        <div class="chip">今すぐ</div>
        <div class="chip">そのうち</div>
        <div class="chip">保留</div>
      </div>
    </div>
  </div>

  <!-- ▌グループ2：チャンネル・プレイリスト -->
  <div class="fsec fsec-2">
    <div class="fsec-title">📂 チャンネル・プレイリスト</div>

    <div class="fbar-row">
      <span class="fbar-lbl">T / B</span>
      <div class="hrow">
        <div class="htag">Top</div>
        <div class="htag">Bottom</div>
      </div>
    </div>

    <div class="fbar-row">
      <span class="fbar-lbl">Playlist</span>
      <div class="hrow">
        <div class="htag">+ 追加</div>
      </div>
    </div>

    <div class="fbar-row" style="margin-bottom:3px">
      <span class="fbar-lbl">Channel</span>
      <div class="hrow">
        <div class="htag">+ 追加</div>
      </div>
    </div>
  </div>

  <!-- ▌グループ3：コンテンツ（技術・ポジション等） -->
  <div class="fsec fsec-3">
    <div class="fsec-title">🥋 コンテンツ（技術・ポジション）</div>

    <div class="fbar-row">
      <span class="fbar-lbl">Action</span>
      <div class="hrow">
        <div class="htag">テイクダウン</div>
        <div class="htag on" style="background:#f59e0b;border-color:#f59e0b;color:#fff;">スイープ</div>
        <div class="htag">+ 追加</div>
      </div>
    </div>

    <div class="fbar-row">
      <span class="fbar-lbl">Position</span>
      <div class="hrow">
        <div class="htag">クローズドガード</div>
        <div class="htag">+ 追加</div>
      </div>
    </div>

    <div class="fbar-row" style="margin-bottom:3px">
      <span class="fbar-lbl">Technique</span>
      <div class="hrow">
        <div class="htag">+ 追加</div>
      </div>
    </div>
  </div>

  <!-- 保存エリア -->
  <div class="save-area">
    <div class="save-area-title">💾 検索条件を保存</div>
    <div class="save-row">
      <input class="save-input" type="text" placeholder="条件名を入力...">
      <button class="save-btn">保存</button>
    </div>
    <button class="reset-btn">× Reset</button>
  </div>

</div>

</body>
</html>
