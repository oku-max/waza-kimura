<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bare Test</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; padding: 24px; margin: 0; background: #fff; color: #111; text-align: center; }
  .label { font-size: 18px; color: #666; margin-top: 30px; }
  .big { font-size: 110px; font-weight: 900; line-height: 1; margin: 14px 0; }
  .unit { font-size: 28px; color: #888; margin-left: 6px; vertical-align: top; }
  .ok  { color: #0a7a00; }
  .warn{ color: #c87000; }
  .ng  { color: #c80000; }
  .info{ font-size: 13px; color: #555; margin-top: 40px; line-height: 1.6; }
  hr { margin: 30px 0 18px; border: none; border-top: 1px solid #ddd; }
  .small { font-size: 11px; color: #888; margin-top: 8px; word-break: break-all; }
</style>
</head>
<body>
<div class="label">このページの読み込み時間</div>
<div class="big" id="bignum">…</div>

<div class="info">
  <b>緑（&lt; 1秒）= 速い</b><br>
  <b>橙（1〜3秒）= ふつう</b><br>
  <b>赤（3秒以上）= 遅い</b>
</div>

<hr>
<div class="info">
  ↓ このボタンか、ブラウザの更新ボタンを<br>
  <b>連続で何度も押して</b>ください。<br>
  毎回の数字を観察してください。
</div>
<button onclick="location.reload()" style="font-size:22px;padding:14px 32px;margin-top:18px;border-radius:12px;border:1.5px solid #888;background:#f4f4f4">↻ リロード</button>

<div class="small" id="netinfo"></div>

<script>
(function(){
  function showResult(){
    var ms = 0;
    try {
      var nav = performance.getEntriesByType('navigation')[0];
      if (nav) ms = Math.round(nav.domContentLoadedEventEnd - nav.startTime);
    } catch(e){}
    if (!ms) ms = Math.round(performance.now());

    var el = document.getElementById('bignum');
    el.innerHTML = ms + '<span class="unit">ms</span>';
    if (ms < 1000) el.className = 'big ok';
    else if (ms < 3000) el.className = 'big warn';
    else el.className = 'big ng';

    var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    document.getElementById('netinfo').textContent =
      (conn ? ('回線: ' + conn.effectiveType + ' / ' + (conn.downlink||'?') + ' Mbps') : '');
  }
  if (document.readyState === 'complete') showResult();
  else window.addEventListener('load', function(){ setTimeout(showResult, 0); });
})();
</script>
</body>
</html>
