<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4層タグ 横スライド Mock</title>
<style>
:root{--bg:#f6f7f9;--surf:#fff;--surf2:#f1f2f5;--border:#e3e5ea;--text:#1a1d23;--text2:#55606f;--text3:#8a94a3;--accent:#6b3fd4;--hover:#f5f1ff}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:13px/1.5 -apple-system,"Hiragino Sans",sans-serif}
.info{padding:14px 18px;background:var(--surf);color:var(--text2);font-size:12px;border-bottom:1px solid var(--border)}
.info b{color:var(--text)}
.demo{max-width:960px;margin:20px auto;background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;height:640px;box-shadow:0 8px 32px rgba(0,0,0,.08)}

.hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surf2)}
.hdr h2{margin:0;font-size:14px;font-weight:700}
.hdr .x{font-size:20px;color:var(--text3);cursor:pointer;padding:0 6px}

.search{padding:8px 14px;border-bottom:1px solid var(--border)}
.search input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--surf);color:var(--text);font-family:inherit}

.tabs{display:flex;gap:3px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surf2);overflow-x:auto}
.tab{flex:1;min-width:72px;text-align:center;padding:7px 8px;border-radius:6px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;background:var(--surf);border:1px solid var(--border);white-space:nowrap;position:relative}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab .bdg{display:inline-block;background:rgba(255,255,255,.25);color:#fff;font-size:9px;padding:0 5px;border-radius:6px;margin-left:4px;font-weight:700}
.tab:not(.on) .bdg{background:var(--accent);color:#fff}

/* 横スクロールカルーセル */
.track{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;min-height:0}
.track::-webkit-scrollbar{display:none}
.col{flex:0 0 100%;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border);scroll-snap-align:start}
.col:last-child{border-right:none}
.col-hdr{padding:8px 12px;font-size:10px;font-weight:700;color:var(--text3);background:var(--surf2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;letter-spacing:.3px}
.col-hdr select{font-size:10px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;background:var(--surf);color:var(--text2);cursor:pointer;font-family:inherit}
.col-body{flex:1;overflow-y:auto;padding:2px 0;min-height:0}
.row{padding:9px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:12px;border-left:3px solid transparent;color:var(--text)}
.row:hover{background:var(--hover)}
.row.on{background:var(--hover);border-left-color:var(--accent);font-weight:700;color:var(--accent)}
.row .cnt{font-size:11px;color:var(--text3);font-weight:500}
.row.on .cnt{color:var(--accent)}
.row.zero{opacity:.4}

/* 幅に応じて 1~4 カラム同時表示 */
@media (min-width:560px){.col{flex:0 0 50%}}
@media (min-width:820px){.col{flex:0 0 33.333%}}
@media (min-width:1080px){.col{flex:0 0 25%}}

.ftr{border-top:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;background:var(--surf2);flex-wrap:wrap;min-height:44px}
.ftr .lbl{font-size:10px;color:var(--text3);font-weight:700;margin-right:4px}
.pill{background:var(--accent);color:#fff;padding:2px 9px;border-radius:10px;font-size:10px;cursor:pointer;font-weight:700}
.pill:after{content:" ×";opacity:.7}
.sp{flex:1}
.hit{font-size:12px;color:var(--accent);font-weight:700}
.clr{font-size:10px;color:var(--text3);cursor:pointer;text-decoration:underline;margin-right:6px}
.apply{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:6px;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit}

/* 端末枠シミュレーション */
.frames{display:flex;gap:24px;padding:20px;flex-wrap:wrap;justify-content:center}
.frame{background:#000;border:2px solid #222;border-radius:20px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.frame .demo{margin:0;border-radius:12px}
.frame .label{color:#fff;font-size:11px;text-align:center;padding:6px 0 4px;font-weight:700}
.phone .demo{width:340px;height:640px}
.tablet .demo{width:700px;height:640px}
.desk .demo{width:960px;height:640px}
</style></head><body>

<div class="info">
<b>4層タグ 横スライド Mock</b> — タブ or 左右フリック/スクロールでカラムを切替。画面幅に応じて 1/2/3/4 カラム同時表示 (560/820/1080px ブレーク)。下の端末枠は CSS でサイズ固定しているので実際のブラウザのレスポンシブ動作を見るには <b>このウィンドウの幅を変えて</b>ください ↓ ビューポート幅: <span id="vw"></span>px
</div>

<!-- リアル動作版 (ブラウザ幅に応じてカラム数が変わる) -->
<div class="demo" id="demo-live">
  <div class="hdr"><h2>🏷️ タグで絞り込む <span style="color:var(--text3);font-size:10px;font-weight:500">(ブラウザ幅に応じて 1~4 カラム)</span></h2><span class="x">✕</span></div>
  <div class="search"><input id="q" placeholder="🔍 タグ名で検索..."></div>
  <div class="tabs" id="tabs"></div>
  <div class="track" id="track"></div>
  <div class="ftr">
    <span class="lbl">選択中:</span>
    <div id="pills" style="display:flex;gap:5px;flex-wrap:wrap"><span style="color:var(--text3);font-size:11px">なし</span></div>
    <span class="sp"></span>
    <span class="clr" id="clr">クリア</span>
    <span class="hit" id="hit">0 件</span>
    <button class="apply">適用</button>
  </div>
</div>

<script>
const DATA = [
  { k:'tb',   label:'T/B',        items:[['トップ',224],['ボトム',386],['スタンディング',0]] },
  { k:'cat',  label:'カテゴリ',   items:[['エスケープ・ディフェンス',109],['ガードリテンション',42],['ガード構築・エントリー',0],['コンセプト・原理',0],['コントロール／プレッシャー',88],['スイープ',5],['テイクダウン',22],['パスガード',0],['バックテイク・バックアタック',0],['フィニッシュ',123]] },
  { k:'pos',  label:'ポジション', items:[['50/50',0],['Kガード',2],['SLX',0],['Xガード',1],['インバーテッド',0],['クローズドガード',228],['サドル',0],['スタンディング',0],['スパイダーガード',0],['その他',0],['タートル',22],['ディープハーフ',0],['デラヒーバ',26],['ニーシールド',0],['ハーフガード',50],['バタフライガード',1],['ラッソーガード',0],['ラペルガード',0],['リバースデラヒーバ',0],['ワームガード',0],['片襷片袖',0]] },
  { k:'tags', label:'#タグ',      items:[['#基本',42],['#初心者',18],['#ノーギ',31],['#ギ',120],['#ドリル',9],['#試合',15],['#コンセプト',7],['#連携',22]] }
];
const sel = {tb:new Set(),cat:new Set(),pos:new Set(),tags:new Set()};
const sort = {tb:'abc',cat:'abc',pos:'abc',tags:'cnt'};
let q = '';
let activeTab = 0;

const tabsEl = document.getElementById('tabs');
const trackEl = document.getElementById('track');

function build(){
  // tabs
  tabsEl.innerHTML = DATA.map((d,i)=>{
    const n = sel[d.k].size;
    return `<div class="tab${i===activeTab?' on':''}" data-i="${i}">${d.label}${n?`<span class="bdg">${n}</span>`:''}</div>`;
  }).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    const i = +t.dataset.i;
    activeTab = i;
    // スクロールでそのカラムへ
    const col = trackEl.children[i];
    if (col) col.scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'});
    build();
  });

  // cols
  trackEl.innerHTML = DATA.map(d=>{
    let list = d.items.slice();
    if (q) list = list.filter(([n])=>n.toLowerCase().includes(q));
    if (sort[d.k]==='abc') list.sort((a,b)=>a[0].localeCompare(b[0],'ja'));
    else list.sort((a,b)=>b[1]-a[1]);
    const rows = list.map(([n,c])=>{
      const on = sel[d.k].has(n);
      return `<div class="row${on?' on':''}${c===0&&!on?' zero':''}" data-k="${d.k}" data-n="${n}"><span>${n}</span><span class="cnt">${c}本</span></div>`;
    }).join('') || '<div style="padding:14px;color:var(--text3);font-size:11px">該当なし</div>';
    return `<div class="col" data-k="${d.k}">
      <div class="col-hdr"><span>${d.label}</span>
        <select data-sort="${d.k}">
          <option value="abc"${sort[d.k]==='abc'?' selected':''}>あいうえ順</option>
          <option value="cnt"${sort[d.k]==='cnt'?' selected':''}>件数順</option>
        </select>
      </div>
      <div class="col-body">${rows}</div>
    </div>`;
  }).join('');
  trackEl.querySelectorAll('.row').forEach(r=>r.onclick=()=>{
    const k=r.dataset.k, n=r.dataset.n;
    sel[k].has(n)?sel[k].delete(n):sel[k].add(n);
    build();
  });
  trackEl.querySelectorAll('select').forEach(s=>s.onchange=()=>{sort[s.dataset.sort]=s.value;build();});

  // pills & hit
  const all = Object.keys(sel).flatMap(k=>[...sel[k]].map(n=>[k,n]));
  const pills = document.getElementById('pills');
  pills.innerHTML = all.length ? all.map(([k,n])=>`<span class="pill" data-k="${k}" data-n="${n}">${n}</span>`).join('') : '<span style="color:var(--text3);font-size:11px">なし</span>';
  pills.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{sel[p.dataset.k].delete(p.dataset.n);build();});
  const total = all.length ? Math.max(1, 751 - all.length*40) : 751;
  document.getElementById('hit').textContent = total + ' 件';
}

document.getElementById('q').oninput = e=>{q=e.target.value.trim().toLowerCase();build();};
document.getElementById('clr').onclick = ()=>{Object.values(sel).forEach(s=>s.clear());build();};

// スクロール位置に応じてアクティブタブを更新
let scrollTimer;
trackEl.addEventListener('scroll',()=>{
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(()=>{
    const cw = trackEl.children[0]?.offsetWidth || 1;
    const i = Math.round(trackEl.scrollLeft / cw);
    if (i !== activeTab && i >= 0 && i < DATA.length) {
      activeTab = i;
      tabsEl.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('on',idx===activeTab));
    }
  },80);
});

function updVW(){document.getElementById('vw').textContent = window.innerWidth;}
window.addEventListener('resize',updVW);updVW();
build();
</script>

</body></html>
