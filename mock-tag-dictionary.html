<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOCK — タグ辞書管理（日英対応）</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#1c1c1e;--surface:#2c2c2e;--surface2:#38383a;--surface3:#48484a;--accent:#e5c47a;--gold:#e5c47a;--gold-soft:#2e2a1e;--text:#e5e5e7;--text2:#ababab;--text3:#8e8e93;--border:#48484a;--border2:#3a3a3c;--green:#6bc490;--green-soft:#1e2e24;--blue:#7ab8e0;--blue-soft:#1e2530;--purple:#a090d0;--purple-soft:#28253a;--red:#e06060;--red-soft:#2e1e1e;--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.hdr h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.hdr h1 span{font-size:11px;background:var(--accent);color:#1c1c1e;padding:2px 8px;border-radius:10px;font-weight:700;}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;}

.lang-bar{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 20px;}
.lang-tab{padding:10px 20px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;}
.lang-tab.active{color:var(--accent);border-color:var(--accent);}
.lang-tab:hover:not(.active){color:var(--text2);}

.stats{display:flex;gap:10px;padding:16px 20px;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:8px;}
.stat-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;}
.stat-num.green{color:var(--green);}
.stat-num.yellow{color:var(--accent);}
.stat-label{font-size:11px;color:var(--text3);}

.toolbar{display:flex;gap:8px;padding:0 20px 12px;align-items:center;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;gap:6px;flex:1;min-width:200px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:12px;flex:1;font-family:inherit;}
.sort-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;}
.sort-btn.active{background:var(--accent);color:#1c1c1e;border-color:var(--accent);}
.add-btn{background:var(--accent);color:#1c1c1e;border:none;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}

.dict-wrap{padding:0 20px 20px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:600px;}
th{text-align:left;padding:10px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--bg);}
td{padding:10px 8px;border-bottom:1px solid var(--border2);vertical-align:top;font-size:12px;}
tr:hover td{background:var(--surface);}
tr.pending td{background:var(--gold-soft);}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.badge.approved{background:var(--green-soft);color:var(--green);}
.badge.pending{background:var(--gold-soft);color:var(--gold);}
.alias-chip{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;background:var(--surface2);color:var(--text2);margin:1px 2px;border:1px solid var(--border2);}
.alias-chip .x{cursor:pointer;margin-left:3px;color:var(--text3);font-weight:700;}
.alias-chip .x:hover{color:var(--red);}
.lang-label{font-size:9px;font-weight:700;color:var(--text3);margin-right:2px;text-transform:uppercase;}
.name-ja{font-weight:700;font-size:13px;}
.name-en{font-size:12px;color:var(--text2);margin-top:2px;}
.cnt{font-family:'DM Mono',monospace;font-weight:600;color:var(--text2);}

.act-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:10px;padding:3px 8px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;margin:1px;white-space:nowrap;}
.act-btn:hover{background:var(--surface2);}
.act-btn.approve{border-color:var(--green);color:var(--green);}
.act-btn.approve:hover{background:var(--green-soft);}
.act-btn.merge{border-color:var(--purple);color:var(--purple);}
.act-btn.merge:hover{background:var(--purple-soft);}
.act-btn.danger{border-color:var(--red);color:var(--red);}
.act-btn.danger:hover{background:var(--red-soft);}

.add-alias-wrap{display:inline-flex;align-items:center;gap:4px;margin-top:3px;}
.add-alias-input{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:10px;color:var(--text);font-family:inherit;outline:none;width:100px;}
.add-alias-input:focus{border-color:var(--accent);}
.add-alias-ok{background:var(--accent);color:#1c1c1e;border:none;border-radius:8px;padding:2px 6px;font-size:10px;font-weight:700;cursor:pointer;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:440px;width:90%;}
.modal h3{font-size:14px;margin-bottom:12px;}
.modal p{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid var(--border);}
.modal-btn.cancel{background:var(--surface2);color:var(--text);}
.modal-btn.confirm{background:var(--accent);color:#1c1c1e;border-color:var(--accent);}
.modal-btn.danger{background:var(--red);color:#fff;border-color:var(--red);}

.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 20px 16px;display:none;}
.add-form.open{display:block;}
.form-row{margin-bottom:10px;}
.form-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--text);font-family:inherit;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:12px;font-weight:600;transition:transform .3s ease;z-index:200;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.info{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>

<div class="hdr">
  <h1>📖 タグ辞書 <span>ADMIN</span></h1>
  <button class="back-btn" onclick="history.back()">← 戻る</button>
</div>

<div class="lang-bar">
  <div class="lang-tab active" onclick="switchLang('all',this)">すべて</div>
  <div class="lang-tab" onclick="switchLang('ja',this)">🇯🇵 日本語</div>
  <div class="lang-tab" onclick="switchLang('en',this)">🇺🇸 English</div>
</div>

<div class="stats" id="stats"></div>

<div class="toolbar">
  <div class="search-box">
    <span style="color:var(--text3)">🔍</span>
    <input id="searchInput" placeholder="タグを検索..." oninput="renderTable()">
  </div>
  <button class="sort-btn active" id="sortName" onclick="setSort('name')">名前順</button>
  <button class="sort-btn" id="sortCount" onclick="setSort('count')">使用回数順</button>
  <button class="add-btn" onclick="toggleAddForm()">+ タグ追加</button>
</div>

<div class="add-form" id="addForm">
  <div class="form-row">
    <div class="form-label">タグID（内部識別子・英数字）</div>
    <input class="form-input" id="newId" placeholder="例: kimura, heel_hook">
  </div>
  <div class="form-row">
    <div class="form-label">表示名</div>
    <div class="form-grid">
      <div><div style="font-size:10px;color:var(--text3);margin-bottom:3px">🇯🇵 日本語</div><input class="form-input" id="newJa" placeholder="キムラ"></div>
      <div><div style="font-size:10px;color:var(--text3);margin-bottom:3px">🇺🇸 English</div><input class="form-input" id="newEn" placeholder="Kimura"></div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-label">別名・表記ゆれ（カンマ区切り）</div>
    <div class="form-grid">
      <input class="form-input" id="newAliasJa" placeholder="キムラロック, ダブルリストロック">
      <input class="form-input" id="newAliasEn" placeholder="kimura lock, double wristlock">
    </div>
  </div>
  <div class="form-actions">
    <button class="modal-btn cancel" onclick="toggleAddForm()">キャンセル</button>
    <button class="modal-btn confirm" onclick="addTag()">追加</button>
  </div>
</div>

<div class="dict-wrap">
  <table>
    <thead><tr>
      <th style="width:26%">タグ名</th>
      <th style="width:38%">別名・表記ゆれ</th>
      <th style="width:8%">使用数</th>
      <th style="width:10%">ステータス</th>
      <th style="width:18%">操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="modal-bg" id="mergeModal">
  <div class="modal">
    <h3>🔗 タグ統合</h3>
    <p id="mergeMsg"></p>
    <div style="margin-bottom:16px">
      <div class="form-label">統合先</div>
      <select class="form-input" id="mergeTarget" style="cursor:pointer"></select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeMerge()">キャンセル</button>
      <button class="modal-btn confirm" onclick="confirmMerge()">統合する</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="deleteModal">
  <div class="modal">
    <h3>🗑 タグ削除</h3>
    <p id="deleteMsg"></p>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeDelete()">キャンセル</button>
      <button class="modal-btn danger" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let TAGS = [
  { id:'kimura', names:{ja:'キムラ',en:'Kimura'}, aliases:{ja:['キムラロック','ダブルリストロック'],en:['kimura lock','double wristlock']}, count:24, status:'approved' },
  { id:'armbar', names:{ja:'アームバー',en:'Armbar'}, aliases:{ja:['腕十字','十字固め'],en:['arm bar','juji gatame']}, count:31, status:'approved' },
  { id:'rnc', names:{ja:'RNC',en:'Rear Naked Choke'}, aliases:{ja:['裸絞め','リアネイキドチョーク'],en:['rear naked','RNC']}, count:18, status:'approved' },
  { id:'triangle', names:{ja:'三角絞め',en:'Triangle Choke'}, aliases:{ja:['トライアングル','三角'],en:['triangle','sankaku']}, count:27, status:'approved' },
  { id:'heel_hook', names:{ja:'ヒールフック',en:'Heel Hook'}, aliases:{ja:['ヒール'],en:['inside heel hook','outside heel hook']}, count:22, status:'approved' },
  { id:'guillotine', names:{ja:'ギロチン',en:'Guillotine Choke'}, aliases:{ja:['ギロチンチョーク'],en:['guillotine','arm-in guillotine','high elbow guillotine']}, count:15, status:'approved' },
  { id:'berimbolo', names:{ja:'ベリンボロ',en:'Berimbolo'}, aliases:{ja:[],en:['bolo']}, count:12, status:'approved' },
  { id:'omoplata', names:{ja:'オモプラッタ',en:'Omoplata'}, aliases:{ja:[],en:['omo plata']}, count:9, status:'approved' },
  { id:'knee_bar', names:{ja:'ニーバー',en:'Kneebar'}, aliases:{ja:[],en:['knee bar']}, count:8, status:'approved' },
  { id:'toe_hold', names:{ja:'トーホールド',en:'Toe Hold'}, aliases:{ja:[],en:['toehold']}, count:6, status:'approved' },
  { id:'americana', names:{ja:'アメリカーナ',en:'Americana'}, aliases:{ja:['V1アームロック'],en:['keylock','paintbrush']}, count:7, status:'approved' },
  { id:'darce', names:{ja:'ダースチョーク',en:"D'Arce Choke"}, aliases:{ja:['ダース'],en:['darce','brabo choke','no-gi brabo']}, count:5, status:'approved' },
  { id:'bow_arrow', names:{ja:'ボウアンドアロー',en:'Bow and Arrow Choke'}, aliases:{ja:[],en:['bow and arrow']}, count:4, status:'approved' },
  { id:'ezekiel', names:{ja:'エゼキエル',en:'Ezekiel Choke'}, aliases:{ja:['エゼキエルチョーク'],en:['ezekiel','sode guruma jime']}, count:3, status:'approved' },
  { id:'calf_slicer', names:{ja:'カーフスライサー',en:'Calf Slicer'}, aliases:{ja:['カーフクラッシャー'],en:['calf crusher','calf crank']}, count:3, status:'pending' },
  { id:'buggy_choke', names:{ja:'バギーチョーク',en:'Buggy Choke'}, aliases:{ja:[],en:['buggy']}, count:2, status:'pending' },
  { id:'wristlock', names:{ja:'リストロック',en:'Wristlock'}, aliases:{ja:['手首関節'],en:['wrist lock']}, count:1, status:'pending' },
];

let currentLang='all', sortMode='name', mergeSourceId=null, deleteTargetId=null;

function renderStats(){
  const ap=TAGS.filter(t=>t.status==='approved').length, pe=TAGS.filter(t=>t.status==='pending').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-num green">${ap}</div><div class="stat-label">承認済み</div></div>
    <div class="stat"><div class="stat-num yellow">${pe}</div><div class="stat-label">未承認</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--text)">${TAGS.length}</div><div class="stat-label">総タグ数</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--blue)">2</div><div class="stat-label">対応言語</div></div>`;
}
function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let f=TAGS.filter(t=>{if(!q)return true;return[...Object.values(t.names),...Object.values(t.aliases).flat(),t.id].some(s=>s.toLowerCase().includes(q));});
  f.sort(sortMode==='name'?(a,b)=>(a.names.ja||a.id).localeCompare(b.names.ja||b.id,'ja'):(a,b)=>b.count-a.count);
  document.getElementById('tbody').innerHTML=f.map(t=>{
    const ip=t.status==='pending';
    return`<tr class="${ip?'pending':''}"><td>${renderNames(t)}</td><td>${renderAliases(t)}
      <div class="add-alias-wrap" id="alias-add-${t.id}" style="display:none">
        <input class="add-alias-input" id="alias-input-${t.id}" placeholder="別名..." onkeydown="if(event.key==='Enter')addAlias('${t.id}')">
        <span style="font-size:9px;color:var(--text3);margin-right:2px">${currentLang==='all'?'ja':currentLang}</span>
        <button class="add-alias-ok" onclick="addAlias('${t.id}')">+</button></div>
    </td><td><span class="cnt">${t.count}</span></td>
    <td><span class="badge ${t.status}">${ip?'未承認':'承認済み'}</span></td>
    <td>${ip?`<button class="act-btn approve" onclick="approveTag('${t.id}')">承認</button>`:''}
      <button class="act-btn" onclick="toggleAliasAdd('${t.id}')">+ 別名</button>
      <button class="act-btn merge" onclick="openMerge('${t.id}')">統合</button>
      <button class="act-btn danger" onclick="openDelete('${t.id}')">削除</button></td></tr>`;
  }).join('');
}
function renderNames(t){
  if(currentLang==='all')return`<div class="name-ja">${t.names.ja}</div><div class="name-en">${t.names.en}</div>`;
  return`<div class="name-ja">${t.names[currentLang]||t.names.en||t.id}</div>`;
}
function renderAliases(t){
  const langs=currentLang==='all'?['ja','en']:[currentLang];
  let h='';
  langs.forEach(l=>{const a=t.aliases[l]||[];if(!a.length)return;h+=`<div style="margin-bottom:3px">`;
    if(currentLang==='all')h+=`<span class="lang-label">${l}</span>`;
    h+=a.map(v=>`<span class="alias-chip">${v}<span class="x" onclick="removeAlias('${t.id}','${l}',\`${v}\`)">&times;</span></span>`).join('')+`</div>`;});
  return h||'<span style="font-size:11px;color:var(--text3)">—</span>';
}
function switchLang(l,el){currentLang=l;document.querySelectorAll('.lang-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderTable();}
function setSort(m){sortMode=m;document.getElementById('sortName').classList.toggle('active',m==='name');document.getElementById('sortCount').classList.toggle('active',m==='count');renderTable();}
function approveTag(id){const t=TAGS.find(x=>x.id===id);if(t){t.status='approved';renderStats();renderTable();showToast(`✅「${t.names.ja}」を承認`,'success');}}
function toggleAliasAdd(id){const el=document.getElementById('alias-add-'+id);el.style.display=el.style.display==='none'?'inline-flex':'none';if(el.style.display!=='none')document.getElementById('alias-input-'+id).focus();}
function addAlias(id){const input=document.getElementById('alias-input-'+id),val=input.value.trim();if(!val)return;const t=TAGS.find(x=>x.id===id),l=currentLang==='all'?'ja':currentLang;
  if(t){if(!t.aliases[l])t.aliases[l]=[];if(!t.aliases[l].includes(val))t.aliases[l].push(val);}input.value='';renderTable();showToast(`「${val}」を${l.toUpperCase()}別名に追加`,'info');}
function removeAlias(id,l,a){const t=TAGS.find(x=>x.id===id);if(t&&t.aliases[l]){t.aliases[l]=t.aliases[l].filter(v=>v!==a);renderTable();showToast(`別名「${a}」を削除`,'info');}}
function openMerge(id){mergeSourceId=id;const s=TAGS.find(t=>t.id===id);
  document.getElementById('mergeMsg').innerHTML=`「<strong>${s.names.ja} / ${s.names.en}</strong>」（${s.count}本）を別のタグに統合します。<br>統合元は削除され、使用回数と別名が統合先に移行します。`;
  document.getElementById('mergeTarget').innerHTML=TAGS.filter(t=>t.id!==id&&t.status==='approved').map(t=>`<option value="${t.id}">${t.names.ja} / ${t.names.en}（${t.count}本）</option>`).join('');
  document.getElementById('mergeModal').classList.add('open');}
function closeMerge(){document.getElementById('mergeModal').classList.remove('open');}
function confirmMerge(){const s=TAGS.find(t=>t.id===mergeSourceId),tgt=TAGS.find(t=>t.id===document.getElementById('mergeTarget').value);
  if(s&&tgt){tgt.count+=s.count;['ja','en'].forEach(l=>{[s.names[l],...(s.aliases[l]||[])].filter(Boolean).forEach(n=>{if(!tgt.aliases[l])tgt.aliases[l]=[];if(n!==tgt.names[l]&&!tgt.aliases[l].includes(n))tgt.aliases[l].push(n);});});
    TAGS=TAGS.filter(t=>t.id!==mergeSourceId);showToast(`🔗「${s.names.ja}」→「${tgt.names.ja}」に統合`,'success');}closeMerge();renderStats();renderTable();}
function openDelete(id){deleteTargetId=id;const t=TAGS.find(x=>x.id===id);
  document.getElementById('deleteMsg').innerHTML=`「<strong>${t.names.ja} / ${t.names.en}</strong>」（${t.count}本で使用中）を削除しますか？`;document.getElementById('deleteModal').classList.add('open');}
function closeDelete(){document.getElementById('deleteModal').classList.remove('open');}
function confirmDelete(){const t=TAGS.find(x=>x.id===deleteTargetId);if(t){TAGS=TAGS.filter(x=>x.id!==deleteTargetId);showToast(`🗑「${t.names.ja}」を削除`,'info');}closeDelete();renderStats();renderTable();}
function toggleAddForm(){document.getElementById('addForm').classList.toggle('open');}
function addTag(){const id=document.getElementById('newId').value.trim(),ja=document.getElementById('newJa').value.trim(),en=document.getElementById('newEn').value.trim();
  if(!id||!ja){showToast('IDと日本語名は必須','info');return;}if(TAGS.find(t=>t.id===id)){showToast('このIDは既に存在します','info');return;}
  const pa=v=>v?v.split(',').map(s=>s.trim()).filter(Boolean):[];
  TAGS.push({id,names:{ja,en:en||ja},aliases:{ja:pa(document.getElementById('newAliasJa').value),en:pa(document.getElementById('newAliasEn').value)},count:0,status:'approved'});
  ['newId','newJa','newEn','newAliasJa','newAliasEn'].forEach(x=>document.getElementById(x).value='');
  toggleAddForm();renderStats();renderTable();showToast(`✅「${ja}」を追加`,'success');}
function showToast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+type;requestAnimationFrame(()=>el.classList.add('show'));setTimeout(()=>el.classList.remove('show'),2500);}
renderStats();renderTable();
</script>
</body>
</html>
