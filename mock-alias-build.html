<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alias Builder v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f6;--card:#fff;--border:#e2e2e8;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --blue:#2a6faa;--gold:#b8860b;--red:#c0392b;
  --top-bg:#e8eef8;--top-c:#2040a0;
  --bot-bg:#e8f4e8;--bot-c:#206020;
  --std-bg:#f3eef8;--std-c:#6020a0;
  --neu-bg:#f0f0f0;--neu-c:#555;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans','Segoe UI',sans-serif;font-size:14px}

/* ── auth ── */
#s-auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:40px 20px}
#s-auth h1{font-size:22px;font-weight:700}
#s-auth .sub{font-size:13px;color:var(--text3);text-align:center}
.btn-google{display:flex;align-items:center;gap:10px;padding:12px 24px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.btn-google:hover{background:#f8f8f8}
#s-load{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:13px;color:var(--text3)}
#s-main{display:none;max-width:500px;margin:0 auto;padding-bottom:60px}

/* ── tabs ── */
.tab-bar{display:flex;border-bottom:2px solid var(--border);background:var(--card);position:sticky;top:0;z-index:20}
.tab-btn{flex:1;padding:12px 4px;border:none;background:none;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:3px;vertical-align:middle}

/* ── progress ── */
.prog-wrap{padding:10px 16px 6px;background:var(--card);border-bottom:1px solid var(--border)}
.prog-row{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-label{font-size:12px;color:var(--text3)}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);transition:width .3s}

/* ── word list ── */
.word-list{padding:8px 10px 60px}

/* ── list row ── */
.list-row{background:var(--card);border-radius:10px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;transition:box-shadow .15s}
.list-row.expanded{box-shadow:0 3px 14px rgba(0,0,0,.11)}

.row-compact{padding:11px 13px;cursor:pointer;user-select:none}
.row-top{display:flex;align-items:baseline;gap:7px;margin-bottom:5px}
.row-word{font-size:19px;font-weight:800;line-height:1.2;word-break:break-all}
.row-count{font-size:11px;color:var(--text3);flex-shrink:0;white-space:nowrap}
.row-bottom{display:flex;align-items:center;gap:6px}
.row-sug{display:flex;align-items:center;gap:5px;flex:1;min-width:0;overflow:hidden}
.row-sug-cat{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-actions{display:flex;gap:4px;flex-shrink:0}
.btn-ok{padding:7px 12px;border-radius:7px;border:none;background:var(--blue);color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-ok:hover{opacity:.88}
.btn-hold-s{padding:7px 9px;border-radius:7px;border:1.5px solid #e0c070;background:#fdf8e0;color:#806020;font-size:12px;cursor:pointer}
.btn-ign-s{padding:7px 9px;border-radius:7px;border:1.5px solid #ccc;background:#f5f5f5;color:#888;font-size:12px;cursor:pointer}

/* ── expanded area ── */
.row-expand{padding:12px 13px;border-top:1px solid var(--border);background:#f9f9fc}
.exp-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:7px}

/* TB row (inline, compact) */
.tb-row-sm{display:flex;gap:5px;margin-bottom:4px}
.btn-tb-s{flex:1;padding:8px 4px;border-radius:8px;border:2px solid transparent;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;white-space:nowrap}
.btn-tb-s.tbbot{background:var(--bot-bg);color:var(--bot-c);border-color:#c8e8c8}
.btn-tb-s.tbtop{background:var(--top-bg);color:var(--top-c);border-color:#c8d8f0}
.btn-tb-s.tbstd{background:var(--std-bg);color:var(--std-c);border-color:#d8c8f0}
.btn-tb-s.tbneu{background:var(--neu-bg);color:var(--neu-c);border-color:#ddd}
.btn-tb-s.sel{border-color:currentColor;box-shadow:0 0 0 2px currentColor;font-weight:800}
.btn-tb-s:hover{filter:brightness(.92)}

/* 2-col category grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px}
.cat-btn-s{display:flex;align-items:center;gap:5px;padding:7px 8px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;text-align:left;transition:background .1s;width:100%;overflow:hidden}
.cat-btn-s:hover{background:#eef4ff;border-color:var(--blue)}
.cat-btn-s.ai-hi{background:#f0eaff;border-color:#8a5fc8}
.cat-btn-s .tb-badge{font-size:8px;padding:1px 4px;flex-shrink:0}
.cat-btn-s .cat-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.cat-btn-s .ai-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:#8a5fc8}

/* act row */
.act-row{display:flex;gap:6px}
.btn-pos{flex:1;padding:9px;border-radius:7px;border:1.5px solid #90c878;background:#f0fce8;color:#306010;font-size:11px;font-weight:700;cursor:pointer}
.btn-pos:hover{background:#e4f8d8}
.btn-hold{flex:1;padding:9px;border-radius:7px;border:1.5px solid #e0c070;background:#fdf8e0;color:#806020;font-size:11px;font-weight:700;cursor:pointer}
.btn-hold:hover{background:#f8f0c8}
.btn-ignore{flex:1;padding:9px;border-radius:7px;border:1.5px solid #ccc;background:#f5f5f5;color:#888;font-size:11px;font-weight:700;cursor:pointer}
.btn-ignore:hover{background:#eee}

/* ── thumbnails ── */
.thumbs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.thumb-a{flex-shrink:0;width:90px;text-decoration:none}
.thumb-img{width:90px;height:51px;object-fit:cover;border-radius:5px;background:#eee;display:block}
.thumb-title{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── tb-badge shared ── */
.tb-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;vertical-align:middle}
.tb-top{background:var(--top-bg);color:var(--top-c)}
.tb-bot{background:var(--bot-bg);color:var(--bot-c)}
.tb-std{background:var(--std-bg);color:var(--std-c)}
.tb-neu{background:var(--neu-bg);color:var(--neu-c)}

/* ── hold tab ── */
.hold-list{padding:10px 16px;display:flex;flex-direction:column;gap:10px}
.hold-item{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border)}
.hold-word{font-size:18px;font-weight:800;margin-bottom:6px}
.hold-vlist{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.hold-vlink{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--blue);font-size:12px}
.hold-vthumb{width:54px;height:30px;object-fit:cover;border-radius:4px;background:#eee;flex-shrink:0}
.hold-section-lbl{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.hold-tb-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.btn-hold-tb{padding:6px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);font-size:11px;font-weight:700;cursor:pointer;color:var(--text2)}
.btn-hold-tb.sel.tbbot{background:var(--bot-bg);border-color:#6ab87c;color:var(--bot-c)}
.btn-hold-tb.sel.tbtop{background:var(--top-bg);border-color:#6080d0;color:var(--top-c)}
.btn-hold-tb.sel.tbstd{background:var(--std-bg);border-color:#9060c8;color:var(--std-c)}
.btn-hold-tb.sel.tbneu{background:var(--neu-bg);border-color:#999;color:var(--neu-c)}
.hold-resolve{display:flex;flex-wrap:wrap;gap:5px}
.btn-res{padding:6px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:background .1s}
.btn-res:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-res.pos{border-color:#90c878;background:#f0fce8;color:#306010}
.btn-res.ignore{border-color:#ccc;color:#aaa}

/* ── done tab ── */
.done-wrap{padding:10px 16px 6px}
.done-group{margin-bottom:14px}
.done-glabel{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.done-chips{display:flex;flex-wrap:wrap;gap:4px}
.done-chip{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:12px;font-size:12px;font-weight:600;border:1.5px solid;cursor:pointer;background:#fff;transition:opacity .1s}
.done-chip:hover{opacity:.65}
.btn-export{display:block;width:calc(100% - 32px);margin:8px 16px 12px;padding:12px;border-radius:8px;border:none;background:var(--gold);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.export-out{margin:0 16px 20px;background:#1a1a2e;color:#a8d8a8;font-size:11px;padding:12px;border-radius:8px;font-family:monospace;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;display:none}

/* ── misc ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px;line-height:1.7}
.all-done{text-align:center;padding:40px 20px}
.all-done .big{font-size:48px;margin-bottom:12px}
.all-done .msg{font-size:14px;color:var(--text2)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(26,26,46,.92);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1}
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>

<div id="s-auth">
  <div style="font-size:36px">📚</div>
  <h1>Alias Builder</h1>
  <p class="sub">管理者アカウントでログインして<br>エイリアス分類を開始します</p>
  <button class="btn-google" onclick="signIn()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"/></svg>
    Google でログイン
  </button>
</div>

<div id="s-load">
  <div class="spinner"></div>
  <div class="load-msg" id="load-msg">データを読み込み中…</div>
</div>

<div id="s-main">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('card')" id="tbtn-card">分類作業</button>
    <button class="tab-btn" onclick="switchTab('hold')" id="tbtn-hold">保留<span class="tab-badge" id="hold-badge" style="display:none">0</span></button>
    <button class="tab-btn" onclick="switchTab('done')" id="tbtn-done">完了済み</button>
  </div>

  <div id="tab-card">
    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-label" id="prog-label">0 / 0</span>
        <span class="prog-label" id="prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0"></div></div>
    </div>
    <div class="word-list" id="word-list"></div>
  </div>

  <div id="tab-hold" style="display:none">
    <div class="hold-list" id="hold-list"></div>
  </div>

  <div id="tab-done" style="display:none">
    <div class="done-wrap" id="done-wrap"></div>
    <button class="btn-export" onclick="exportAliases()">📋 alias をエクスポート</button>
    <div class="export-out" id="export-out"></div>
  </div>
</div>

<div id="toast"></div>

function _norm(s) {
  if (!s) return '';
  let v = String(s);
  v = v.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  v = v.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
  v = v.toLowerCase();
  v = v.replace(/[ー\-_/\s・,.、。]+/g, '');
  v = v.replace(/(がーど|がど|guard)$/i, '');
  return v;
}
const SW_JA = new Set(['の','を','が','は','に','で','と','も','から','まで','より','など','て','し','な','い','う','こと','もの','ため','際','場合','として','について','という','ような','ので','けど','ながら','する','した','して','できる','わかる','なる','ある','いる','方','その','この','あの','どう','なぜ','なに','何','それ','これ','あれ','でも','しかし','また','そして','つまり','完全','完璧','最強','最高','最新','必見','必須','おすすめ','まとめ','解説','入門','基礎','基本','応用','道場','先生','師匠','試合','世界','日本']);
const SW_EN = new Set(['a','an','the','and','or','of','to','in','for','on','at','by','from','with','about','is','are','was','were','be','been','have','has','had','do','does','did','will','would','could','should','may','might','can','you','your','my','i','we','vs','bjj','mma','jiu','jitsu','jiujitsu','grappling','no','gi','how','why','what','when','where','who','if','this','that']);
const EP_PAT = /^(part|vol|ep|lecture|lesson|第)[0-9０-９]*$|^[0-9０-９]+(回|講|号|章|本目|部)$|^#?[0-9０-９]+$/i;

// ═══════════════════════════════════════════════════════
// Tokenizer
// ═══════════════════════════════════════════════════════
function tokenize(title) {
  if (!title) return [];
  let t = title
    .replace(/【[^】]{12,}】/g, ' ')
    .replace(/\([^)]{12,}\)/g, ' ')
    .replace(/（[^）]{12,}）/g, ' ');
  const parts = t.split(/[\s　【】「」『』（）()[\]＆&＃#・〜~→←↑↓★☆♪●○■□▶！!？?。、,.\|｜\/]+/);
  const result = new Set();
  const enWords = [];
  for (const tok of parts) {
    const w = tok.trim();
    if (!w || w.length < 2) continue;
    if (EP_PAT.test(w)) continue;
    if (/^(part|vol|ep|no\.?|lecture|lesson)\.?\d+$/i.test(w)) continue;
    const wl = w.toLowerCase();
    if (SW_JA.has(w) || SW_EN.has(wl)) continue;
    if (SW_JA.has(_norm(w))) continue;
    if (/^[぀-鿿ｦ-ﾟ]+$/.test(w) && w.length >= 2) {
      if (/[ぁ-ゖ]/.test(w) && /[゠-ヿ]/.test(w)) {
        // カタカナ＋ひらがな混合 → ひらがな助詞で分割
        // 「ブルーファイターからのロングステップパス」→「ブルーファイター」+「ロングステップパス」
        for (const frag of w.split(/[ぁ-ゖ]+/).filter(f => f.length >= 2)) {
          if (SW_JA.has(frag) || SW_JA.has(_norm(frag))) continue;
          if (_norm(frag).length < 2) continue;
          result.add(frag);
        }
      } else { result.add(w); }
    }
    else if (/^[゠-ヿ]+$/.test(w) && w.length >= 2) result.add(w);
    else if (/^[a-zA-Z]{2,}$/.test(w)) { result.add(w); enWords.push(wl); }
    else if (w.length >= 2 && /[a-zA-Z]/.test(w) && !/^[\d０-９]+$/.test(w)) {
      if (/[ぁ-ゖ]/.test(w)) {
        // ラテン＋ひらがな混合 → ひらがな部分で分割（「SLXへの入り方」→「SLX」）
        for (const frag of w.split(/[ぁ-ゖ]+/).filter(f => f.length >= 2)) {
          if (SW_JA.has(frag) || SW_JA.has(_norm(frag))) continue;
          if (_norm(frag).length < 1) continue;
          result.add(frag);
          for (const lp of (frag.match(/[a-zA-Z]{2,}/g) || []))
            if (!SW_EN.has(lp.toLowerCase())) enWords.push(lp.toLowerCase());
        }
      } else { result.add(w); }
    }
  }
  for (let i = 0; i < enWords.length - 1; i++) {
    if (!SW_EN.has(enWords[i]) && !SW_EN.has(enWords[i+1]))
      result.add(enWords[i] + ' ' + enWords[i+1]);
  }
  const tNorm = _norm(title);
  const foundPos = new Set();
  for (const p of POSITIONS) {
    if (p.id === 'other') continue;
    const allKeys = [p.ja, ...(p.aliases||[])].sort((a,b) => b.length - a.length);
    for (const k of allKeys) {
      const kn = _norm(k);
      if (kn.length < 3) continue;
      if (tNorm.includes(kn)) { result.add(p.ja); foundPos.add(p.ja); break; }
    }
  }
  for (const tok of Array.from(result)) {
    if (foundPos.has(tok)) continue;
    const tn = _norm(tok);
    if (!tn) { result.delete(tok); continue; }
    for (const posName of foundPos) {
      const pos = POSITIONS.find(p => p.ja === posName);
      if (!pos) continue;
      const longerNorms = [pos.ja, ...(pos.aliases||[])].map(_norm).filter(k => k && k.length > tn.length);
      if (longerNorms.some(k => k.includes(tn))) { result.delete(tok); break; }
    }
  }
  return Array.from(result);
}

// ═══════════════════════════════════════════════════════
// AI classification
// ═══════════════════════════════════════════════════════
function aiSuggest(word) {
  const n = _norm(word);
  if (!n || n.length < 1) return {type:'ignore', label:'無視', reason:'短すぎ'};
  // ドメインルール: パスを含む語は必ずパスガード
  // POSITIONS部分一致より先に判定しないと「ハーフガードパス」がポジションに取られる
  if (n.includes('ぱす')) {
    return {type:'cat', catName:'パスガード', label:'パスガード', reason:'パス系→パスガード'};
  }
  for (const p of POSITIONS) {
    const keys = [p.ja, ...(p.aliases||[])].map(_norm).filter(Boolean);
    if (keys.some(k => k === n)) return {type:'pos', label:'ポジション', detail:p.ja, reason:`ポジション一致: ${p.ja}`};
  }
  for (const p of POSITIONS) {
    const keys = [p.ja, ...(p.aliases||[])].map(_norm).filter(k => k && k.length >= 2);
    if (n.length >= 2 && keys.some(k => k.includes(n) || n.includes(k)))
      return {type:'pos', label:'ポジション', detail:p.ja, reason:`ポジション類似: ${p.ja}`};
  }
  for (const c of CAT_ALIASES) {
    const keys = [c.name, ...(c.al||[])].map(_norm).filter(Boolean);
    if (keys.some(k => k === n)) return {type:'cat', catName:c.name, label:c.name, reason:'カテゴリ一致'};
  }
  for (const c of CAT_ALIASES) {
    const keys = [c.name, ...(c.al||[])].map(_norm).filter(k => k && k.length >= 2);
    if (n.length >= 3 && keys.some(k => k.includes(n) || n.includes(k)))
      return {type:'cat', catName:c.name, label:c.name, reason:'カテゴリ部分一致'};
  }
  const topNorms = TB_KW_TOP.map(_norm).filter(k => k && k.length >= 2);
  if (topNorms.some(k => k === n || (n.length >= 3 && k.length >= 2 && (k.includes(n) || n.includes(k)))))
    return {type:'cat', catName:'テクニック（トップ）', label:'テクニック（トップ）', reason:'トップ系KW一致'};
  const botNorms = TB_KW_BOT.map(_norm).filter(k => k && k.length >= 2);
  if (botNorms.some(k => k === n || (n.length >= 3 && k.length >= 2 && (k.includes(n) || n.includes(k)))))
    return {type:'cat', catName:'テクニック（ボトム）', label:'テクニック（ボトム）', reason:'ボトム系KW一致'};
  return {type:'hold', label:'保留', reason:'判断不能'};
}

function getTBFromSug(sug) {
  if (sug.type === 'pos') return 'ボトム';
  if (sug.type === 'cat') {
    const cat = CATS.find(c => c.name === sug.catName);
    if (!cat) return '判断不能';
    return cat.tb === '中立' ? '判断不能' : cat.tb;
  }
  return '判断不能';
}

async function loadAll() {
  setMsg('保存済みデータを確認中…');
  let saved = {};
  try {
    const snap = await db.doc(`users/${uid}/data/alias_builder`).get();
    if (snap.exists) saved = snap.data().words || {};
  } catch(e) { console.warn('alias_builder load:', e); }
  setMsg('動画リストを読み込み中…');
  let videos = [];
  try {
    const url = await storage.ref(`users/${uid}/videos.json`).getDownloadURL();
    videos = (await (await fetch(url)).json()).videos || [];
  } catch(e) {
    try { videos = (await db.doc(`users/${uid}/data/videos`).get()).data()?.videos || []; }
    catch(e2) { console.warn('videos load:', e2); }
  }
  setMsg(`${videos.length}本を分析中…`);
  buildItems(videos, saved);
  show('s-main');
  renderList();
  updateBadges();
}

// ═══════════════════════════════════════════════════════
// Build word items
// ═══════════════════════════════════════════════════════
function buildItems(videos, saved) {
  const freq = new Map(), vmap = new Map();
  for (const v of videos) {
    const seen = new Set();
    for (const tok of tokenize(v.title || '')) {
      if (seen.has(tok)) continue; seen.add(tok);
      freq.set(tok, (freq.get(tok) || 0) + 1);
      if (!vmap.has(tok)) vmap.set(tok, []);
      const list = vmap.get(tok);
      if (list.length < 3) {
        const ytId = String(v.ytId || v.id || '');
        list.push({ytId: ytId.length === 11 ? ytId : '', title: v.title || ''});
      }
    }
  }
  const savedByWord = {};
  for (const [k, val] of Object.entries(saved)) {
    const w = val.w || k;
    if (val.d && val.d !== 'undecided') savedByWord[w] = val;
  }
  wordItems = Array.from(freq.entries())
    .filter(([, c]) => c >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([word, count]) => {
      const sv = savedByWord[word];
      return {word, count, vids: vmap.get(word)||[], sug: aiSuggest(word),
              dec: sv ? {type:sv.d, catName:sv.c||null, tb:sv.tb||null} : null};
    });
  wordItems.sort((a, b) => {
    if (!a.dec && !b.dec) return b.count - a.count;
    if (!a.dec) return -1; if (!b.dec) return 1; return 0;
  });
}

// ═══════════════════════════════════════════════════════
// Render list
// ═══════════════════════════════════════════════════════
function renderList() {
  const scrollY = window.scrollY;
  const listEl  = document.getElementById('word-list');

  const total   = wordItems.length;
  const decided = wordItems.filter(w => w.dec && w.dec.type !== 'hold').length;
  document.getElementById('prog-label').textContent = `${decided} / ${total} 完了`;
  const pct = total ? Math.round(decided / total * 100) : 0;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  const undecided = wordItems.filter(w => !w.dec);
  if (!undecided.length) {
    listEl.innerHTML = `<div class="all-done"><div class="big">🎉</div>
      <div class="msg">全ての単語を分類しました！<br>「完了済み」タブでエクスポートできます。</div></div>`;
    window.scrollTo(0, scrollY); return;
  }

  listEl.innerHTML = undecided.map(item => {
    const s       = item.sug;
    const sugTB   = getTBFromSug(s);
    const sugTbCls = tbBadgeCls(sugTB);
    const isExp   = activeWord === item.word;
    const curTB   = isExp ? activeTB : null; // activeTB is set when row expands

    // Compact row suggestion label
    const sugLabel = s.type === 'pos' ? `📍 ${s.detail||'ポジション'}` :
                     s.type === 'cat' ? s.catName : '（保留）';

    let expandHtml = '';
    if (isExp) {
      // TB buttons — activeTB pre-set to AI suggestion
      const tbBtns = TB_LIST.map(tb => {
        const info  = TB_INFO[tb];
        const isSel = tb === activeTB;
        const isAI  = tb === sugTB;
        return `<button class="btn-tb-s ${info.cls}${isSel?' sel':''}"
          data-tb="${tb}" onclick="selectTBInRow(this)">${tb}${isAI?'✦':''}</button>`;
      }).join('');

      // Sort cats: matching activeTB first
      const sorted = [...CATS].sort((a, b) => {
        const aM = a.tb === activeTB || (activeTB==='判断不能' && a.tb==='中立');
        const bM = b.tb === activeTB || (activeTB==='判断不能' && b.tb==='中立');
        return (aM&&!bM)?-1:(!aM&&bM)?1:0;
      });
      const catBtns = sorted.map(c => {
        const tcls = TB_CLS[c.tb]||'tb-neu';
        const isAI = s.type==='cat' && s.catName===c.name;
        return `<button class="cat-btn-s${isAI?' ai-hi':''}"
          data-word="${esc(item.word)}" data-type="cat" data-cat="${esc(c.name)}"
          onclick="listDecide(this)">
          <span class="tb-badge ${tcls}">${c.tb}</span>
          <span class="cat-name">${esc(c.name)}</span>
          ${isAI?'<span class="ai-dot"></span>':''}
        </button>`;
      }).join('');

      const thumbs = item.vids.filter(v=>v.ytId).slice(0,3).map(v=>
        `<a class="thumb-a" href="https://youtu.be/${esc(v.ytId)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <img class="thumb-img" src="https://img.youtube.com/vi/${esc(v.ytId)}/mqdefault.jpg" loading="lazy" onerror="this.parentElement.style.display='none'" alt="">
          <div class="thumb-title">${esc(v.title)}</div>
        </a>`).join('');

      expandHtml = `<div class="row-expand" onclick="event.stopPropagation()">
        ${thumbs?`<div class="thumbs">${thumbs}</div>`:''}
        <div class="exp-lbl">TB　<span style="font-weight:400;opacity:.6;font-size:9px">（✦ = AI提案）</span></div>
        <div class="tb-row-sm">${tbBtns}</div>
        <div class="exp-lbl" style="margin-top:10px">カテゴリ</div>
        <div class="cat-grid">${catBtns}</div>
        <div class="act-row">
          <button class="btn-pos"    data-word="${esc(item.word)}" data-type="pos"    onclick="listDecide(this)">📍 ポジション</button>
          <button class="btn-hold"   data-word="${esc(item.word)}" data-type="hold"   onclick="listDecide(this)">🔖 保留</button>
          <button class="btn-ignore" data-word="${esc(item.word)}" data-type="ignore" onclick="listDecide(this)">✕ 無視</button>
        </div>
      </div>`;
    }

    return `<div class="list-row${isExp?' expanded':''}" data-word="${esc(item.word)}" onclick="toggleExpand(this)">
      <div class="row-compact">
        <div class="row-top">
          <span class="row-word">${esc(item.word)}</span>
          <span class="row-count">${item.count}本</span>
        </div>
        <div class="row-bottom">
          <div class="row-sug">
            <span class="tb-badge ${sugTbCls}">${sugTB}</span>
            <span class="row-sug-cat">${esc(sugLabel)}</span>
          </div>
          <div class="row-actions" onclick="event.stopPropagation()">
            <button class="btn-ok" data-word="${esc(item.word)}" onclick="acceptAI(this)">✓ 承認</button>
            <button class="btn-hold-s" data-word="${esc(item.word)}" data-type="hold"   onclick="listDecide(this)">🔖</button>
            <button class="btn-ign-s"  data-word="${esc(item.word)}" data-type="ignore" onclick="listDecide(this)">✕</button>
          </div>
        </div>
      </div>
      ${expandHtml}
    </div>`;
  }).join('');

  window.scrollTo(0, scrollY);
}

// ═══════════════════════════════════════════════════════
// List interactions
// ═══════════════════════════════════════════════════════
function toggleExpand(el) {
  const word = el.dataset.word;
  if (activeWord === word) {
    activeWord = null; activeTB = null;
  } else {
    activeWord = word;
    const item = wordItems.find(w => w.word === word);
    activeTB = item ? getTBFromSug(item.sug) : '判断不能'; // pre-select AI TB
  }
  renderList();
  if (activeWord) {
    setTimeout(() => {
      const row = document.querySelector('.list-row.expanded');
      if (row) row.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 40);
  }
}

function selectTBInRow(el) {
  event.stopPropagation();
  activeTB = el.dataset.tb;
  renderList();
}

function acceptAI(el) {
  event.stopPropagation();
  const word = el.dataset.word;
  const item = wordItems.find(w => w.word === word);
  if (!item) return;
  const s  = item.sug;
  const tb = getTBFromSug(s);
  if (s.type === 'pos') decide(word, 'pos', null, tb);
  else if (s.type === 'cat') decide(word, 'cat', s.catName, tb);
  else decide(word, 'hold', null, null);
}

function listDecide(el) {
  event.stopPropagation();
  const word = el.dataset.word;
  const type = el.dataset.type;
  const cat  = el.dataset.cat || null;
  const tb   = (type==='cat'||type==='pos') ? (activeTB||'判断不能') : null;
  decide(word, type, cat, tb);
}

// ═══════════════════════════════════════════════════════
// Decide (core)
// ═══════════════════════════════════════════════════════
function decide(word, type, catName, tb) {
  const item = wordItems.find(w => w.word === word);
  if (!item) return;

  let finalTB = null;
  if (type === 'cat' || type === 'pos') finalTB = tb || '判断不能';
  else if (type === 'hold') finalTB = tb || null;

  item.dec = {type, catName: catName||null, tb: finalTB};

  const key = word.replace(/\./g,'__dot__').replace(/\//g,'__sl__');
  pending[key] = {d:type, w:word, t:Date.now()};
  if (finalTB) pending[key].tb = finalTB;
  if (catName) pending[key].c = catName;
  scheduleSave();

  const tbTag = finalTB ? ` [${finalTB}]` : '';
  showToast(type==='pos'    ? `📍 ポジション${tbTag}` :
            type==='hold'   ? '🔖 保留' :
            type==='ignore' ? '✕ 無視' :
            `${catName||''}${tbTag} ✓`);

  if (activeWord === word) { activeWord = null; activeTB = null; }
  renderList();
  updateBadges();
  if (curTab === 'done') renderDone();
}

function undecide(word) {
  const item = wordItems.find(w => w.word === word);
  if (!item) return;
  item.dec = null;
  const key = word.replace(/\./g,'__dot__').replace(/\//g,'__sl__');
  pending[key] = {d:'undecided', w:word, t:Date.now()};
  scheduleSave();
  activeWord = null; activeTB = null;
  switchTab('card');
  renderList(); renderDone(); updateBadges();
}

// ═══════════════════════════════════════════════════════
// Firestore save
// ═══════════════════════════════════════════════════════
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(flush, 2500); }
async function flush() {
  if (!uid || !Object.keys(pending).length) return;
  const batch = {...pending}; pending = {};
  try {
    await db.doc(`users/${uid}/data/alias_builder`).set(
      {words:batch, lastUpdated:firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
  } catch(e) { console.error('Save failed:', e); Object.assign(pending, batch); setTimeout(flush, 6000); }
}

// ═══════════════════════════════════════════════════════
// Hold tab
// ═══════════════════════════════════════════════════════
function renderHold() {
  const held = wordItems.filter(w => w.dec?.type === 'hold');
  const el = document.getElementById('hold-list');
  if (!held.length) { el.innerHTML = '<div class="empty">保留中の項目はありません</div>'; return; }
  el.innerHTML = held.map(item => {
    const vlinks = item.vids.filter(v=>v.ytId).map(v=>
      `<a class="hold-vlink" href="https://youtu.be/${esc(v.ytId)}" target="_blank" rel="noopener">
        <img class="hold-vthumb" src="https://img.youtube.com/vi/${esc(v.ytId)}/mqdefault.jpg" loading="lazy" onerror="this.style.display='none'" alt="">
        <span>${esc(v.title)}</span>
      </a>`).join('');
    const selTB = holdTBState[item.word] || null;
    const tbBtns = TB_LIST.map(tb => {
      const isSel = selTB === tb;
      const cls   = TB_INFO[tb].cls;
      return `<button class="btn-hold-tb ${cls}${isSel?' sel':''}"
        onclick="selectHoldTB('${esc(item.word)}','${tb}')">${tb}</button>`;
    }).join('');
    const resBtns = CATS.map(c =>
      `<button class="btn-res" data-word="${esc(item.word)}" data-type="cat" data-cat="${esc(c.name)}" onclick="resolveBtn(this)">${esc(c.name)}</button>`
    ).join('') +
    `<button class="btn-res pos"    data-word="${esc(item.word)}" data-type="pos"    onclick="resolveBtn(this)">📍 ポジション</button>` +
    `<button class="btn-res ignore" data-word="${esc(item.word)}" data-type="ignore" onclick="resolveBtn(this)">✕ 無視</button>`;
    return `<div class="hold-item">
      <div class="hold-word">${esc(item.word)} <span style="font-size:11px;color:#999">(${item.count}本)</span></div>
      <div class="hold-vlist">${vlinks||'<span style="color:#bbb;font-size:12px">サムネイルなし</span>'}</div>
      <div class="hold-section-lbl">TB 選択</div>
      <div class="hold-tb-row">${tbBtns}</div>
      <div class="hold-section-lbl">カテゴリ</div>
      <div class="hold-resolve">${resBtns}</div>
    </div>`;
  }).join('');
}
function selectHoldTB(word, tb) { holdTBState[word] = tb; renderHold(); }
function resolveBtn(el) {
  const word = el.dataset.word, type = el.dataset.type, cat = el.dataset.cat||null;
  const item = wordItems.find(w => w.word === word);
  if (!item) return;
  const finalTB = (type==='cat'||type==='pos') ? (holdTBState[word]||'判断不能') : null;
  item.dec = {type, catName:cat, tb:finalTB};
  const key = word.replace(/\./g,'__dot__').replace(/\//g,'__sl__');
  pending[key] = {d:type, w:word, t:Date.now()};
  if (finalTB) pending[key].tb = finalTB;
  if (cat) pending[key].c = cat;
  scheduleSave();
  delete holdTBState[word];
  const tbTag = finalTB ? ` [${finalTB}]` : '';
  showToast((cat||type) + tbTag + ' ✓');
  renderHold(); renderDone(); updateBadges();
}

// ═══════════════════════════════════════════════════════
// Done tab
// ═══════════════════════════════════════════════════════
function renderDone() {
  const wrap = document.getElementById('done-wrap');
  const groups = {};
  for (const item of wordItems) {
    if (!item.dec || item.dec.type === 'hold') continue;
    const key = item.dec.type==='cat' ? item.dec.catName :
                item.dec.type==='pos' ? '_pos' : '_ignore';
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  }
  let html = '';
  for (const cat of CATS) {
    const items = groups[cat.name]; if (!items?.length) continue;
    const tcls = TB_CLS[cat.tb]||'tb-neu';
    const chips = items.map(item => {
      const eTB  = item.dec.tb;
      const eCls = eTB ? tbBadgeCls(eTB) : tcls;
      return `<span class="done-chip ${eCls}" style="border-color:currentColor"
        onclick="undecide('${esc(item.word)}')" title="クリックで取り消し">${esc(item.word)}</span>`;
    }).join('');
    html += `<div class="done-group">
      <div class="done-glabel"><span class="tb-badge ${tcls}">${cat.tb}</span>${esc(cat.name)} (${items.length})</div>
      <div class="done-chips">${chips}</div></div>`;
  }
  if (groups['_pos']?.length) {
    const chips = groups['_pos'].map(i => {
      const eTB = i.dec.tb; const eCls = eTB ? tbBadgeCls(eTB) : 'tb-bot';
      return `<span class="done-chip ${eCls}" style="border-color:currentColor"
        onclick="undecide('${esc(i.word)}')" title="クリックで取り消し">${esc(i.word)}</span>`;
    }).join('');
    html += `<div class="done-group"><div class="done-glabel">📍 ポジション (${groups['_pos'].length})</div>
      <div class="done-chips">${chips}</div></div>`;
  }
  if (groups['_ignore']?.length) {
    const chips = groups['_ignore'].map(i =>
      `<span class="done-chip tb-neu" style="border-color:#ccc;color:#aaa"
        onclick="undecide('${esc(i.word)}')" title="クリックで取り消し">${esc(i.word)}</span>`).join('');
    html += `<div class="done-group"><div class="done-glabel" style="color:var(--text3)">✕ 無視 (${groups['_ignore'].length})</div>
      <div class="done-chips">${chips}</div></div>`;
  }
  wrap.innerHTML = html || '<div class="empty">まだ完了済みの項目はありません</div>';
}

function exportAliases() {
  const lines = [];
  for (const cat of CATS) {
    const items = wordItems.filter(w => w.dec?.type==='cat' && w.dec.catName===cat.name);
    if (items.length) {
      lines.push(`// ${cat.name}  (カテゴリTB: ${cat.tb})\n` +
        `  aliases: [...existing, '${items.map(i=>i.word).join("', '")}'],\n` +
        `  // TB明示: ${items.map(i=>`${i.word}[${i.dec.tb||'?'}]`).join(', ')}`);
    }
  }
  const pos = wordItems.filter(w => w.dec?.type==='pos');
  if (pos.length) lines.push(`// ポジション候補\n  '${pos.map(i=>i.word).join("', '")}'`);
  const out = document.getElementById('export-out');
  out.style.display = 'block';
  out.textContent = lines.length ? lines.join('\n\n') : '（まだ割り当てがありません）';
}

// ═══════════════════════════════════════════════════════
// Tabs / UI helpers
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  curTab = tab;
  ['card','hold','done'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
    document.getElementById('tbtn-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='hold') renderHold();
  if (tab==='done') renderDone();
}
function updateBadges() {
  const n = wordItems.filter(w => w.dec?.type==='hold').length;
  const b = document.getElementById('hold-badge');
  b.textContent = n; b.style.display = n ? 'inline' : 'none';
}
function show(id) {
  document.getElementById('s-auth').style.display = id==='s-auth'?'flex':'none';
  document.getElementById('s-load').style.display = id==='s-load'?'flex':'none';
  document.getElementById('s-main').style.display = id==='s-main'?'block':'none';
}
function esc(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
let toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 1800);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (curTab !== 'card') return;
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'Escape') { activeWord = null; activeTB = null; renderList(); }
  if (!activeWord) return;
  const item = wordItems.find(w => w.word === activeWord);
  if (!item) return;
  if (e.key === 'Enter') acceptAI({dataset:{word:activeWord}});
  if (e.key === 'h' || e.key === 'H') decide(activeWord, 'hold', null, null);
  if (e.key === 'x' || e.key === 'X') decide(activeWord, 'ignore', null, null);
});
</script>
